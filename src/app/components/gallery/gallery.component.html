<main class="bg-background min-h-screen">
  <section class="section-padding">
    <div class="max-w-5xl mx-auto px-4 w-full">

      <!-- Header -->
      <div class="text-center mb-8 w-full">
        <h1 class="font-script text-5xl text-ink mb-2">Galería</h1>
        <p class="text-ink/70 font-body text-sm tracking-wide mb-1">
          Todos los recuerdos del día
        </p>
        <p *ngIf="!loading && !error && files.length" class="text-ink/50 font-body text-xs">
          {{ imageCount }} fotos · {{ videoCount }} vídeos
        </p>
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="flex flex-col items-center justify-center py-24 gap-4">
        <div class="gallery-spinner"></div>
        <p class="text-ink/50 font-body text-sm">Cargando recuerdos...</p>
      </div>

      <!-- Error -->
      <div *ngIf="!loading && error" class="flex flex-col items-center justify-center py-24 gap-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" class="text-ink/30">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="text-ink/70 font-body text-sm text-center">{{ error }}</p>
        <button (click)="loadFiles()"
          class="px-4 py-2 text-sm border-b-2 border-sage-dark text-sage-dark font-body
                 hover:text-sage-dark/70 hover:border-sage-dark/70 transition-colors bg-transparent">
          Reintentar
        </button>
      </div>

      <!-- Empty -->
      <div *ngIf="!loading && !error && !files.length"
        class="flex flex-col items-center justify-center py-24 gap-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" class="text-ink/20">
          <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
          <circle cx="9" cy="9" r="2"/>
          <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
        </svg>
        <p class="text-ink/50 font-body text-sm text-center">
          Aún no hay fotos. ¡Sé el primero en subir!
        </p>
        <a routerLink="/fotos"
          class="px-4 py-2 text-sm border-b-2 border-sage-dark text-sage-dark font-body
                 hover:text-sage-dark/70 hover:border-sage-dark/70 transition-colors">
          Subir fotos
        </a>
      </div>

      <!-- Gallery grid -->
      <div *ngIf="!loading && !error && files.length" class="gallery-grid">
        <div *ngFor="let file of files; let i = index"
          class="gallery-item"
          [style.animation-delay]="(i * 50) + 'ms'">

          <!-- Image -->
          <img *ngIf="file.isImage"
            [src]="downloadUrl(file.key)"
            [alt]="file.filename"
            class="gallery-thumb"
            loading="lazy" />

          <!-- Video placeholder -->
          <div *ngIf="file.isVideo" class="gallery-thumb gallery-video-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.5">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>

          <!-- Unknown type placeholder -->
          <div *ngIf="!file.isImage && !file.isVideo" class="gallery-thumb gallery-unknown-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
              <polyline points="13 2 13 9 20 9"/>
            </svg>
          </div>

          <!-- Hover overlay -->
          <div class="gallery-overlay">
            <p class="gallery-overlay-name">{{ file.filename }}</p>
            <a [href]="downloadUrl(file.key)"
              download
              target="_blank"
              class="gallery-download-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" x2="12" y1="15" y2="3"/>
              </svg>
              Descargar
            </a>
          </div>

        </div>
      </div>

    </div>
  </section>
</main>
